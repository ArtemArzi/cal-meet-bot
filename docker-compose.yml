services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    restart: unless-stopped
    environment:
      BOT_VSTRECHI_RUN_BACKGROUND_WORKERS: "false"
    expose:
      - "8000"
    volumes:
      - bot_data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "bot_vstrechi.worker_entrypoint"]
    env_file:
      - .env.production
    restart: unless-stopped
    environment:
      BOT_VSTRECHI_RUN_BACKGROUND_WORKERS: "true"
    volumes:
      - bot_data:/data

  nginx:
    image: nginx:1.27-alpine
    env_file:
      - .env.production
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required in .env.production}
    depends_on:
      - app
      - worker
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$${DOMAIN}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
        while :; do sleep 6h & wait $${!}; nginx -s reload; done &
        nginx -g "daemon off;"
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    depends_on:
      - nginx
    restart: unless-stopped
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot-init:
    image: certbot/certbot:latest
    env_file:
      - .env.production
    profiles:
      - init
    ports:
      - "80:80"
    command: /bin/sh -c 'certbot certonly --standalone --non-interactive --agree-tos --email "$${CERTBOT_EMAIL}" -d "$${DOMAIN}" --keep-until-expiring'
    volumes:
      - letsencrypt:/etc/letsencrypt

volumes:
  bot_data:
  letsencrypt:
  certbot_www:
